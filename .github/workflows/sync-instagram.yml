name: Sync Instagram Feed

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest Instagram posts
        id: fetch
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: node scripts/fetch-instagram.mjs

      - name: Commit updated feed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/instagram.json
          git diff --quiet --cached || git commit -m "Update Instagram feed data [skip ci]"
          git pull --rebase origin main
          git push

      - name: Update INSTAGRAM_ACCESS_TOKEN secret if it was refreshed
        if: steps.fetch.outputs.token != ''
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          gh secret set INSTAGRAM_ACCESS_TOKEN --body "${{ steps.fetch.outputs.token }}" --repo ${{ github.repository }}
